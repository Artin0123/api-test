name: API Key Test

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *" # Daily UTC 00:00

concurrency:
  group: api-test-run
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install aiohttp

      - name: Run tester
        env:
          PAGES_URL: ${{ secrets.PAGES_URL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: python -u async_test_keys.py

      - name: Notify Discord
        if: always()
        env:
          PAGES_URL: ${{ secrets.PAGES_URL }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          # Strip trailing slash to match Python's rstrip("/") behavior
          BASE="${PAGES_URL%/}"

          SETTINGS=$(curl -sf \
            -H "Authorization: Bearer $ADMIN_PASSWORD" \
            "$BASE/api/settings" || echo '{}')
          WEBHOOK=$(echo "$SETTINGS" | python3 -c \
            "import sys,json; s=json.load(sys.stdin).get('settings',{}); print(s.get('discord_webhook_url',''))" 2>/dev/null || true)

          if [ -z "$WEBHOOK" ]; then
            echo "No Discord webhook configured, skipping notification."
            exit 0
          fi

          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            ICON="✅"
            MSG="API Key 测试完成"
          else
            ICON="❌"
            MSG="API Key 测试失败或被取消"
          fi

          curl -sf -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"$ICON $MSG — $BASE\"}" \
            || echo "Discord notification failed (non-fatal)"
