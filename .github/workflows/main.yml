name: API Test Run

on:
  workflow_dispatch:  # Manual trigger via GitHub Actions UI
  schedule:
    - cron: "0 2 * * *"  # Daily at UTC 02:00

concurrency:
  group: api-test-run
  cancel-in-progress: false  # Queue, don't cancel running jobs

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Run API tester
        env:
          PAGES_URL: ${{ secrets.PAGES_URL }}
          MASTER_API_TOKEN: ${{ secrets.MASTER_API_TOKEN }}
        run: python runner.py
